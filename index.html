<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlaams Sprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FC4C02;
    --orange-dark: #d93e00;
    --orange-glow: rgba(252,76,2,0.18);
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --green: #2ecc71;
    --blue: #3a9bd5;
    --yellow: #f5a623;
    --radius: 12px;
    --font: 'Barlow', sans-serif;
    --font-cond: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOP NAV */
  nav {
    background: #111;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-cond);
    font-weight: 900;
    font-size: 22px;
    color: var(--orange);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .logo span { color: var(--text); }
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; flex: 1; }
  .nav-tab {
    background: none; border: none; color: var(--text-muted);
    font-family: var(--font); font-size: 13px; font-weight: 600;
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .nav-tab.active { background: var(--orange); color: white; }
  .nav-tab:hover:not(.active) { background: var(--surface); color: var(--text); }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 20px;
    padding: 6px 14px; flex-shrink: 0;
  }
  .streak-fire { font-size: 18px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  .streak-num { font-family: var(--font-cond); font-weight: 900; font-size: 20px; color: var(--orange); }
  .streak-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

  /* PAGES */
  .page { display: none; max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
  .page.active { display: block; }

  /* SECTION HEADERS */
  .section-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 16px; margin-top: 28px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-title {
    font-family: var(--font-cond); font-weight: 700;
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-muted);
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* HERO STATS */
  .hero-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-card.accent { border-color: var(--orange); background: rgba(252,76,2,0.06); }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    font-weight: 600; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-family: var(--font-cond); font-weight: 900; font-size: 32px; line-height: 1; }
  .stat-value.orange { color: var(--orange); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* WEEK CARDS */
  .week-grid { display: flex; flex-direction: column; gap: 12px; }
  .week-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: border-color 0.15s;
  }
  .week-card:hover { border-color: rgba(252,76,2,0.4); }
  .week-card.current { border-color: var(--orange); }
  .week-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .week-num {
    font-family: var(--font-cond); font-weight: 900; font-size: 28px;
    color: var(--text-dim); min-width: 32px;
  }
  .week-card.current .week-num { color: var(--orange); }
  .week-card.done .week-num { color: var(--green); }
  .week-info { flex: 1; }
  .week-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .week-goal { font-size: 12px; color: var(--text-muted); }
  .week-badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; padding: 4px 10px; border-radius: 20px;
  }
  .badge-current { background: var(--orange-glow); color: var(--orange); }
  .badge-done { background: rgba(46,204,113,0.12); color: var(--green); }
  .badge-locked { background: var(--surface2); color: var(--text-dim); }
  .badge-unlocked { background: rgba(58,155,213,0.12); color: var(--blue); }
  .week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 14px 16px; }
  .day-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; padding: 10px 4px; border-radius: 8px;
    border: 1.5px solid var(--border); background: none;
    cursor: pointer; transition: all 0.15s; font-family: var(--font);
  }
  .day-btn:hover:not(.done):not(.locked) {
    border-color: var(--orange); background: var(--orange-glow);
  }
  .day-btn.done {
    background: rgba(46,204,113,0.1); border-color: var(--green);
  }
  .day-btn.locked { opacity: 0.35; cursor: default; }
  .day-btn.review { border-style: dashed; }
  .day-num { font-family: var(--font-cond); font-weight: 700; font-size: 16px; line-height: 1; }
  .day-check { font-size: 14px; height: 16px; display: flex; align-items: center; justify-content: center; }
  .day-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.4px; }
  .day-btn.done .day-num { color: var(--green); }
  .week-progress-bar { height: 3px; background: var(--surface3); }
  .week-progress-fill { height: 100%; background: var(--orange); transition: width 0.4s ease; }
  .week-card.done .week-progress-fill { background: var(--green); }

  /* HEATMAP */
  .heatmap-wrap { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; }
  .heatmap-months { display: flex; gap: 4px; margin-bottom: 6px; margin-left: 28px; }
  .heatmap-month-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
  .heatmap-grid { display: flex; gap: 3px; }
  .heatmap-days-col { display: flex; flex-direction: column; gap: 4px; margin-right: 6px; }
  .heatmap-day-label { font-size: 9px; color: var(--text-muted); height: 12px; display: flex; align-items: center; }
  .heatmap-weeks { display: flex; gap: 3px; flex: 1; overflow: hidden; }
  .heatmap-week-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 12px; height: 12px; border-radius: 2px;
    background: var(--surface3); cursor: pointer;
    transition: transform 0.1s;
  }
  .heatmap-cell:hover { transform: scale(1.3); }
  .heatmap-cell.l1 { background: rgba(252,76,2,0.25); }
  .heatmap-cell.l2 { background: rgba(252,76,2,0.5); }
  .heatmap-cell.l3 { background: rgba(252,76,2,0.75); }
  .heatmap-cell.l4 { background: var(--orange); }
  .heatmap-legend { display: flex; align-items: center; gap: 6px; margin-top: 12px; justify-content: flex-end; }
  .heatmap-legend span { font-size: 10px; color: var(--text-muted); }
  .legend-cell { width: 10px; height: 10px; border-radius: 2px; }

  /* QUIZ */
  .quiz-wrap { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; }
  .quiz-category {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .cat-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text-muted); font-family: var(--font); font-size: 12px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.15s;
  }
  .cat-btn.active { background: var(--orange-glow); border-color: var(--orange); color: var(--orange); }
  .cat-btn:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .quiz-question {
    font-size: 13px; color: var(--text-muted); text-transform: uppercase;
    font-weight: 600; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .quiz-prompt {
    font-family: var(--font-cond); font-weight: 700; font-size: 26px;
    line-height: 1.2; margin-bottom: 20px; color: var(--text);
  }
  .quiz-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; font-style: italic; }
  .quiz-input-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .quiz-input {
    flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text);
    font-family: var(--font); font-size: 16px; outline: none; transition: border-color 0.15s;
  }
  .quiz-input:focus { border-color: var(--orange); }
  .quiz-input.correct { border-color: var(--green); background: rgba(46,204,113,0.06); }
  .quiz-input.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.06); }
  .quiz-submit {
    background: var(--orange); border: none; border-radius: 10px;
    padding: 12px 22px; color: white; font-family: var(--font);
    font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .quiz-submit:hover { background: var(--orange-dark); }
  .quiz-submit:disabled { opacity: 0.5; cursor: default; }
  .quiz-feedback {
    border-radius: 10px; padding: 14px 16px; font-size: 14px;
    display: none; margin-bottom: 12px;
  }
  .quiz-feedback.correct { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: var(--green); display: block; }
  .quiz-feedback.wrong { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; display: block; }
  .quiz-feedback strong { font-weight: 700; }
  .quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .quiz-score { font-family: var(--font-cond); font-weight: 700; font-size: 18px; }
  .quiz-score span { color: var(--orange); }
  .quiz-next {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text-muted); font-family: var(--font); font-size: 13px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: all 0.15s;
  }
  .quiz-next:hover { border-color: var(--orange); color: var(--orange); }
  .quiz-progress { height: 3px; background: var(--surface3); border-radius: 2px; margin-bottom: 20px; }
  .quiz-progress-fill { height: 100%; background: var(--orange); border-radius: 2px; transition: width 0.3s; }

  /* VOCAB */
  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .vocab-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; cursor: pointer;
    transition: border-color 0.15s; user-select: none;
  }
  .vocab-card:hover { border-color: rgba(252,76,2,0.4); }
  .vocab-flemish { font-family: var(--font-cond); font-weight: 700; font-size: 18px; margin-bottom: 4px; color: var(--orange); }
  .vocab-english { font-size: 13px; color: var(--text-muted); }
  .vocab-note { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-style: italic; }
  .vocab-filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text-muted); font-family: var(--font); font-size: 12px;
    font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer;
  }
  .filter-btn.active { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }

  /* FIELD TEST */
  .field-test-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .ft-week { font-family: var(--font-cond); font-weight: 900; font-size: 36px; color: var(--text-dim); min-width: 40px; }
  .ft-info { flex: 1; }
  .ft-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .ft-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .ft-done-btn {
    background: none; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 8px 16px; color: var(--text-muted);
    font-family: var(--font); font-size: 12px; font-weight: 700;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .ft-done-btn.done { border-color: var(--green); color: var(--green); background: rgba(46,204,113,0.08); }
  .ft-done-btn:hover:not(.done) { border-color: var(--orange); color: var(--orange); }

  /* CONFETTI */
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti-piece {
    position: fixed; width: 8px; height: 8px; pointer-events: none;
    animation: confetti-fall linear forwards; z-index: 9999; border-radius: 2px;
  }

  /* RESPONSIVE */
  @media (max-width: 520px) {
    .hero-stats { grid-template-columns: repeat(2, 1fr); }
    .stat-card:last-child { grid-column: span 2; }
    .week-days { grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-num { font-size: 13px; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <div class="logo">Vlaams<span>Sprint</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showPage('quiz')">Quiz</button>
    <button class="nav-tab" onclick="showPage('vocab')">Vocab</button>
    <button class="nav-tab" onclick="showPage('challenges')">Challenges</button>
  </div>
  <div class="streak-badge">
    <span class="streak-fire">🔥</span>
    <span class="streak-num" id="nav-streak">0</span>
    <span class="streak-label">days</span>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">

  <div class="hero-stats">
    <div class="stat-card accent">
      <div class="stat-label">🔥 Current streak</div>
      <div class="stat-value orange" id="stat-streak">0</div>
      <div class="stat-sub">days in a row</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✅ Days complete</div>
      <div class="stat-value" id="stat-days">0</div>
      <div class="stat-sub">of 49 total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📅 Current week</div>
      <div class="stat-value" id="stat-week">1</div>
      <div class="stat-sub" id="stat-week-name">Foundations</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Consistency map</div>
    <div class="section-line"></div>
  </div>
  <div class="heatmap-wrap">
    <div class="heatmap-months" id="heatmap-months"></div>
    <div class="heatmap-grid">
      <div class="heatmap-days-col">
        <div class="heatmap-day-label">M</div>
        <div class="heatmap-day-label" style="height:12px"></div>
        <div class="heatmap-day-label">W</div>
        <div class="heatmap-day-label" style="height:12px"></div>
        <div class="heatmap-day-label">F</div>
        <div class="heatmap-day-label" style="height:12px"></div>
        <div class="heatmap-day-label">S</div>
      </div>
      <div class="heatmap-weeks" id="heatmap-weeks"></div>
    </div>
    <div class="heatmap-legend">
      <span>Less</span>
      <div class="legend-cell" style="background:var(--surface3)"></div>
      <div class="legend-cell l1"></div>
      <div class="legend-cell l2"></div>
      <div class="legend-cell l3"></div>
      <div class="legend-cell l4"></div>
      <span>More</span>
    </div>
  </div>

  <div class="section-header" style="margin-top:28px">
    <div class="section-title">Your 7-week plan</div>
    <div class="section-line"></div>
  </div>
  <div class="week-grid" id="week-grid"></div>

</div>

<!-- QUIZ -->
<div class="page" id="page-quiz">

  <div class="section-header">
    <div class="section-title">Daily practice</div>
    <div class="section-line"></div>
  </div>

  <div class="quiz-wrap">
    <div class="quiz-category" id="quiz-cats"></div>
    <div class="quiz-progress"><div class="quiz-progress-fill" id="quiz-prog-fill" style="width:0%"></div></div>
    <div class="quiz-question" id="quiz-q-label"></div>
    <div class="quiz-prompt" id="quiz-prompt"></div>
    <div class="quiz-hint" id="quiz-hint"></div>
    <div class="quiz-input-row">
      <input type="text" class="quiz-input" id="quiz-input" placeholder="Type your answer…" />
      <button class="quiz-submit" id="quiz-submit" onclick="checkAnswer()">Check</button>
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div class="quiz-nav">
      <div class="quiz-score">Score: <span id="quiz-score-val">0</span> / <span id="quiz-total-val">0</span></div>
      <button class="quiz-next" id="quiz-next" onclick="nextQuestion()" style="display:none">Next →</button>
    </div>
  </div>
</div>

<!-- VOCAB -->
<div class="page" id="page-vocab">
  <div class="vocab-filter" id="vocab-filter"></div>
  <div class="vocab-grid" id="vocab-grid"></div>
</div>

<!-- CHALLENGES -->
<div class="page" id="page-challenges">
  <div class="section-header">
    <div class="section-title">Field tests</div>
    <div class="section-line"></div>
  </div>
  <div id="field-tests-list"></div>
</div>

<script>
// ========== DATA ==========
const WEEKS = [
  {
    num:1, name:"Foundations", theme:"Greetings & present tense",
    grammar:"Present tense, V2 word order",
    goal:"Open and hold a 1-minute introduction",
    days:["Hallo & dag","Numbers, days, time","Ik ben / ik heb","Plural present tense","V2 word order trick","Putting it all together","Review + wild challenge"]
  },
  {
    num:2, name:"Café & bar life", theme:"Modal verbs & ordering",
    grammar:"Willen, kunnen, mogen, moeten",
    goal:"Order drinks and small-talk on a terrace",
    days:["Modals 101","Ordering drinks","Paying & small talk","Café vocabulary","Trappist culture","Full café conversation","Review + wild challenge"]
  },
  {
    num:3, name:"Food & frituur", theme:"De/het & diminutives",
    grammar:"Articles, diminutives (-je, -ke)",
    goal:"Order a meal, navigate a frituur",
    days:["Restaurant arrival","Ordering a meal","The frituur ritual","De or het?","Diminutives in practice","Food vocabulary","Review + wild challenge"]
  },
  {
    num:4, name:"Past tense & storytelling", theme:"Perfect tense",
    grammar:"Hebben / zijn + past participle",
    goal:"Talk about your weekend in past tense",
    days:["Hebben + regular","Zijn + movement","Irregular participles","'t Kofschip rule","Storytelling phrases","Full past tense","Review + wild challenge"]
  },
  {
    num:5, name:"People in your life", theme:"Pronouns & possessives",
    grammar:"Pronouns, possessives, adjectives",
    goal:"Describe friends and family",
    days:["Subject pronouns","Object pronouns","Possessives","Adjective agreement","Family vocabulary","Describing people","Review + wild challenge"]
  },
  {
    num:6, name:"Getting around", theme:"Prepositions & future",
    grammar:"Prepositions, simple future",
    goal:"Take a tram, ask directions, plan a trip",
    days:["Prepositions of place","Movement prepositions","Simple future (gaan)","Zullen + infinitive","Transport vocabulary","Asking directions","Review + wild challenge"]
  },
  {
    num:7, name:"Slang & consolidation", theme:"Sound like a local",
    grammar:"Conditional, ge/gij, filler words",
    goal:"Pull it all together, sound less textbooky",
    days:["Filler words & glue","Antwerp expressions","Zou + infinitive","Ge/gij recognition","Slang deep dive","Full consolidation","Capstone: in de wild!"]
  }
];

const FIELD_TESTS = [
  { week:1, title:"Greet someone in Flemish", desc:"Say hallo to a colleague or neighbour in Flemish. Dag, salut, goeiemorgen — whatever fits. Just do it out loud." },
  { week:2, title:"Order at a café in Flemish", desc:"Walk into a bar and order your drink using Flemish phrases. 'Mag ik een pintje, alstublieft?' Nailed it." },

// ========== STATE ==========
const STATE_KEY = "vlaams_sprint_v3";
function loadState() {
  try {
    const s = localStorage.getItem(STATE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { days:{}, fieldTests:{}, streak:0, lastActive:null };
}
function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}
let state = loadState();

function getTodayKey() {
  return new Date().toISOString().slice(0,10);
}

function markDay(weekIdx, dayIdx) {
  const key = `w${weekIdx}_d${dayIdx}`;
  const wasAlreadyDone = state.days[key];
  state.days[key] = !wasAlreadyDone;
  
  if (!wasAlreadyDone) {
    // check if today's streak
    const today = getTodayKey();
    state.lastActive = today;
    recalcStreak();
    if (isFirstDayToday(weekIdx, dayIdx)) confettiBurst();
  } else {
    recalcStreak();
  }
  saveState();
  renderDashboard();
}

function isFirstDayToday(w, d) {
  // fire confetti only on completing a new day
  return true;
}

// Course started May 9 2026; each lesson day maps to a real calendar date
const COURSE_START = new Date("2026-05-09");

function lessonDateKey(weekIdx, dayIdx) {
  const totalDay = weekIdx * 7 + dayIdx;
  const dt = new Date(COURSE_START);
  dt.setDate(COURSE_START.getDate() + totalDay);
  return dt.toISOString().slice(0, 10);
}

function recalcStreak() {
  // Build a set of calendar dates that have at least one lesson completed
  const doneDates = new Set();
  for (let w = 0; w < 7; w++) {
    for (let d = 0; d < 7; d++) {
      if (state.days[`w${w}_d${d}`]) {
        doneDates.add(lessonDateKey(w, d));
      }
    }
  }
  // Count consecutive days going back from today
  let streak = 0;
  const today = new Date("2026-05-16");
  for (let i = 0; i < 49; i++) {
    const dt = new Date(today);
    dt.setDate(today.getDate() - i);
    const dk = dt.toISOString().slice(0, 10);
    if (doneDates.has(dk)) {
      streak++;
    } else {
      break;
    }
  }
  state.streak = streak;
}

function getDoneCount() {
  return Object.values(state.days).filter(Boolean).length;
}

function getWeekProgress(weekIdx) {
  let done = 0;
  for (let d = 0; d < 7; d++) {
    if (state.days[`w${weekIdx}_d${d}`]) done++;
  }
  return done;
}

function getCurrentWeek() {
  for (let w = 0; w < 7; w++) {
    if (getWeekProgress(w) < 7) return w;
  }
  return 6;
}

// ========== RENDER DASHBOARD ==========
function renderDashboard() {
  const total = getDoneCount();
  const streak = state.streak;
  const curWeek = getCurrentWeek();

  document.getElementById("stat-streak").textContent = streak;
  document.getElementById("stat-days").textContent = total;
  document.getElementById("stat-week").textContent = curWeek + 1;
  document.getElementById("stat-week-name").textContent = WEEKS[curWeek].name;
  document.getElementById("nav-streak").textContent = streak;

  renderHeatmap();
  renderWeekGrid(curWeek);
}

function renderHeatmap() {
  const weeksEl = document.getElementById("heatmap-weeks");
  weeksEl.innerHTML = "";
  const monthsEl = document.getElementById("heatmap-months");
  monthsEl.innerHTML = "";

  // Build date -> level map from actual lesson completions
  const lessonDates = {};
  for (let w = 0; w < 7; w++) {
    for (let d = 0; d < 7; d++) {
      const dk = lessonDateKey(w, d);
      lessonDates[dk] = state.days[`w${w}_d${d}`] ? 4 : 0;
    }
  }

  // Grid starts Monday 4 May 2026 (so May 9 falls in week 2, visible clearly)
  const gridStart = new Date("2026-05-04");
  const NUM_WEEKS = 14;
  let lastMonth = "";
  const monthColSpans = {};

  for (let w = 0; w < NUM_WEEKS; w++) {
    const col = document.createElement("div");
    col.className = "heatmap-week-col";

    for (let d = 0; d < 7; d++) {
      const dt = new Date(gridStart);
      dt.setDate(gridStart.getDate() + w * 7 + d);
      const dk = dt.toISOString().slice(0, 10);
      const level = lessonDates[dk] || 0;

      const cell = document.createElement("div");
      cell.className = "heatmap-cell" + (level ? ` l${level}` : "");
      const label = dt.toLocaleDateString("en-GB", {day:"numeric", month:"short"});
      cell.title = label + (level ? " ✓" : "");
      col.appendChild(cell);

      if (d === 0) {
        const month = dt.toLocaleString("en", { month: "short" });
        if (month !== lastMonth) { monthColSpans[w] = month; lastMonth = month; }
      }
    }
    weeksEl.appendChild(col);
  }

  for (let w = 0; w < NUM_WEEKS; w++) {
    const span = document.createElement("div");
    span.className = "heatmap-month-label";
    span.style.flex = "1";
    span.textContent = monthColSpans[w] || "";
    monthsEl.appendChild(span);
  }
}

function renderWeekGrid(curWeek) {
  const grid = document.getElementById("week-grid");
  grid.innerHTML = "";

  WEEKS.forEach((wk, wi) => {
    const done = getWeekProgress(wi);
    const isLocked = wi > curWeek + 1;
    const isDone = done === 7;
    const isCurrent = wi === curWeek;

    const card = document.createElement("div");
    card.className = "week-card" + (isCurrent ? " current" : "") + (isDone ? " done" : "");

    const badgeClass = isDone ? "badge-done" : isCurrent ? "badge-current" : isLocked ? "badge-locked" : "badge-unlocked";
    const badgeText = isDone ? "✓ Complete" : isCurrent ? "Active" : isLocked ? "Locked" : "Up next";

    card.innerHTML = `
      <div class="week-header">
        <div class="week-num">${wk.num}</div>
        <div class="week-info">
          <div class="week-name">${wk.name}</div>
          <div class="week-goal">${wk.goal}</div>
        </div>
        <span class="week-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="week-progress-bar">
        <div class="week-progress-fill" style="width:${(done/7)*100}%"></div>
      </div>
      <div class="week-days" id="wk-days-${wi}"></div>
    `;

    grid.appendChild(card);

    const daysEl = card.querySelector(`#wk-days-${wi}`);
    wk.days.forEach((dayName, di) => {
      const key = `w${wi}_d${di}`;
      const isDayDone = !!state.days[key];
      const isReview = di === 6;
      const isLk = wi > curWeek + 1 || (wi === curWeek + 1 && di > 0 && !state.days[`w${wi}_d${di-1}`]);
      const btn = document.createElement("button");
      btn.className = "day-btn" + (isDayDone ? " done" : "") + (isLk && !isDayDone ? " locked" : "") + (isReview ? " review" : "");
      const dayDate = lessonDateKey(wi, di);
      const dayDateFmt = new Date(dayDate).toLocaleDateString("en-GB", {day:"numeric", month:"short"});
      btn.title = dayDateFmt;
      btn.innerHTML = `
        <div class="day-num">${di + 1}</div>
        <div class="day-check">${isDayDone ? "✓" : isReview ? "★" : "·"}</div>
        <div class="day-label" style="font-size:8px">${dayDateFmt}</div>
      `;
      if (!isLk || isDayDone) {
        btn.onclick = () => markDay(wi, di);
      }
      daysEl.appendChild(btn);
    });
  });
}

// ========== CONFETTI ==========
function confettiBurst() {
  const colors = ["#FC4C02","#f5a623","#2ecc71","#3a9bd5","#e74c3c","#ffffff"];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.left = Math.random() * 100 + "vw";
    el.style.top = "0px";
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + "s";
    el.style.animationDelay = Math.random() * 0.5 + "s";
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

let quizCat = "V2 Order";
let quizIdx = 0;
let quizScore = 0;
let quizTotal = 0;
let quizAnswered = false;

function initQuiz() {
  const catsEl = document.getElementById("quiz-cats");
  catsEl.innerHTML = "";
  Object.keys(QUIZ_QUESTIONS).forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === quizCat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => {
      quizCat = cat;
      quizIdx = 0; quizScore = 0; quizTotal = 0; quizAnswered = false;
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    catsEl.appendChild(btn);
  });
  loadQuestion();
}

function loadQuestion() {
  const qs = QUIZ_QUESTIONS[quizCat];
  const q = qs[quizIdx % qs.length];
  const total = qs.length;

  document.getElementById("quiz-q-label").textContent = q.type === "inversion" ? "Word Order (V2 Rule)" :
    q.type === "translate" ? "Translate to Flemish" :
    q.type === "participle" ? "Past Participle" :
    q.type === "auxiliary" ? "Hebben or zijn?" : "Vocabulary";
  document.getElementById("quiz-prompt").textContent = q.q;
  document.getElementById("quiz-hint").textContent = "💡 " + q.hint;
  document.getElementById("quiz-prog-fill").style.width = ((quizIdx % total) / total * 100) + "%";

  const input = document.getElementById("quiz-input");
  input.value = "";
  input.className = "quiz-input";
  input.disabled = false;
  input.focus();

  document.getElementById("quiz-feedback").className = "quiz-feedback";
  document.getElementById("quiz-submit").disabled = false;
  document.getElementById("quiz-next").style.display = "none";
  document.getElementById("quiz-score-val").textContent = quizScore;
  document.getElementById("quiz-total-val").textContent = quizTotal;
  quizAnswered = false;
}

function normalize(s) {
  return s.toLowerCase().trim()
    .replace(/[.,!?]/g,"")
    .replace(/\s+/g," ")
    .replace(/ij/g,"ij");
}

function checkAnswer() {
  if (quizAnswered) return;
  const qs = QUIZ_QUESTIONS[quizCat];
  const q = qs[quizIdx % qs.length];
  const input = document.getElementById("quiz-input");
  const user = normalize(input.value);
  const correct = normalize(q.answer);

  // Flexible check: contains key words
  const userWords = user.split(" ");
  const correctWords = correct.split(" ");
  const overlap = correctWords.filter(w => w.length > 2 && userWords.includes(w)).length;
  const isCorrect = user === correct || overlap >= Math.ceil(correctWords.length * 0.7);

  quizTotal++;
  if (isCorrect) {
    quizScore++;
    input.className = "quiz-input correct";
    document.getElementById("quiz-feedback").className = "quiz-feedback correct";
    document.getElementById("quiz-feedback").innerHTML = `<strong>Goed gedaan! ✓</strong> "${q.answer}"`;
  } else {
    input.className = "quiz-input wrong";
    document.getElementById("quiz-feedback").className = "quiz-feedback wrong";
    document.getElementById("quiz-feedback").innerHTML = `<strong>Not quite.</strong> The answer was: <em>"${q.answer}"</em>`;
  }

  document.getElementById("quiz-submit").disabled = true;
  document.getElementById("quiz-next").style.display = "block";
  document.getElementById("quiz-score-val").textContent = quizScore;
  document.getElementById("quiz-total-val").textContent = quizTotal;
  quizAnswered = true;
}

function nextQuestion() {
  quizIdx++;
  loadQuestion();
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("page-quiz").classList.contains("active")) {
    if (!quizAnswered) checkAnswer();
    else nextQuestion();
  }
});
